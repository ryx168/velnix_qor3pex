name: Pipeline

on:
  workflow_dispatch:
    inputs:
      generate_monthly_report:
        description: 'Force-generate monthly report for previous month'
        required: false
        default: false
        type: boolean
      report_only:
        description: 'Only generate report, do not process topics'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 */3 * * *'       # every 3 hours
    - cron: '0 2 1 * *'         # 02:00 on the 1st of every month → monthly report

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      TZ: 'America/Los_Angeles'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      # -------------------------------------------------------
      # CACHE RESTORES
      # -------------------------------------------------------

      - name: Restore Antigravity Data Session
        uses: actions/cache/restore@v4.2.0
        with:
          path: ~/.antigravity_tools
          key: antigravity-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            antigravity-data-${{ runner.os }}-

      - name: Create session directories
        run: mkdir -p ~/.browser-session

      - name: Restore browser session
        uses: actions/cache/restore@v4.2.0
        with:
          path: ~/.browser-session
          key: v-browser-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v-browser-session-${{ runner.os }}-

      - name: Clear stale browser locks
        run: |
          rm -f ~/.browser-session/SingletonLock
          rm -f ~/.browser-session/SingletonCookie
          find ~/.browser-session -name "lockfile" -delete || true

      # -------------------------------------------------------
      # SYSTEM DEPENDENCIES
      # -------------------------------------------------------

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm1 ffmpeg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      # -------------------------------------------------------
      # LLM SOURCE 1: ANTIGRAVITY MANAGER (PRIMARY)
      # -------------------------------------------------------

      - name: Cache Antigravity Docker Image
        if: github.event.inputs.report_only != 'true'
        uses: actions/cache@v4.2.0
        id: cache-antigravity
        with:
          path: /tmp/antigravity-image.tar
          key: antigravity-docker-v1

      - name: Download & Save Docker Image
        if: steps.cache-antigravity.outputs.cache-hit != 'true' && github.event.inputs.report_only != 'true'
        run: |
          docker pull lbjlaq/antigravity-manager:latest
          docker save lbjlaq/antigravity-manager:latest -o /tmp/antigravity-image.tar

      - name: Load Cached Docker Image
        if: steps.cache-antigravity.outputs.cache-hit == 'true' && github.event.inputs.report_only != 'true'
        run: docker load -i /tmp/antigravity-image.tar

      - name: Start Antigravity Manager via Docker
        if: github.event.inputs.report_only != 'true'
        run: |
          docker run -d --name antigravity-manager \
            --restart always \
            -p 8045:8045 \
            -e API_KEY="${{ secrets.ANTIGRAVITY_API_KEY }}" \
            -e NO_CACHE=true \
            -v ~/.antigravity_tools:/root/.antigravity_tools \
            -v ~/.browser-session:/root/.browser-session \
            lbjlaq/antigravity-manager:latest

      - name: Wait for Antigravity Manager to initialize
        if: github.event.inputs.report_only != 'true'
        run: |
          sleep 10
          curl -f http://127.0.0.1:8045/v1/models || echo "API still starting, proceeding..."
          sleep 10

      # -------------------------------------------------------
      # LLM SOURCE 2: GITHUB MODELS (CLOUD FALLBACK)
      # -------------------------------------------------------

      - name: Verify GitHub Models API
        if: github.event.inputs.report_only != 'true'
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GH_MODELS_TOKEN }}" \
            https://models.inference.ai.azure.com/models)
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ GitHub Models API: OK"
            echo "GH_MODELS_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "⚠️ GitHub Models API: HTTP $RESPONSE"
            echo "GH_MODELS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      # -------------------------------------------------------
      # LLM SOURCE 3: CLOUDFLARE WORKERS AI
      # -------------------------------------------------------

      - name: Check Cloudflare AI accounts
        if: github.event.inputs.report_only != 'true'
        run: |
          .venv/bin/python scripts/check_cf_accounts.py --best > /tmp/cf_best.txt 2>&1 || true
          CF_BEST=$(cat /tmp/cf_best.txt | tail -1 | tr -d '[:space:]')
          if [ -n "$CF_BEST" ]; then
            echo "✅ Cloudflare AI: healthy account → ${CF_BEST:0:12}…"
            echo "CF_AI_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "⚠️ Cloudflare AI: no healthy accounts found"
            echo "CF_AI_AVAILABLE=false" >> $GITHUB_ENV
          fi
        env:
          CLOUDFLARE_ACCOUNTS_JSON: ${{ secrets.CLOUDFLARE_ACCOUNTS_JSON }}

      # -------------------------------------------------------
      # LLM SOURCE 4: OLLAMA (LOCAL LAST RESORT)
      # -------------------------------------------------------

      - name: Free up disk space for Ollama
        if: github.event.inputs.report_only != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          docker image prune -f || true
          df -h

      - name: Install and Start Ollama
        if: github.event.inputs.report_only != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          mkdir -p logs
          OLLAMA_HOST=0.0.0.0 ollama serve > logs/ollama_server.log 2>&1 &
          sleep 5
          echo "✅ Ollama server started"

      - name: Cache Ollama model
        if: github.event.inputs.report_only != 'true'
        uses: actions/cache@v4.2.0
        id: cache-ollama-model
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-3b-v1

      - name: Pull Ollama model (if not cached)
        if: steps.cache-ollama-model.outputs.cache-hit != 'true' && github.event.inputs.report_only != 'true'
        run: |
          echo "Pulling llama3.2:3b..."
          ollama pull llama3.2:3b
          echo "✅ Model pulled"

      - name: Verify Ollama ready
        if: github.event.inputs.report_only != 'true'
        run: |
          ollama list
          echo "OLLAMA_AVAILABLE=true" >> $GITHUB_ENV

      # -------------------------------------------------------
      # CREDENTIALS
      # -------------------------------------------------------

      - name: Create Google Credentials & Cookies
        run: |
          if [ -n "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_DRIVE_TOKEN }}" ]; then
            echo "${{ secrets.GOOGLE_DRIVE_TOKEN }}" | base64 --decode > token.json
          fi
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "✅ cookies.txt deployed ($(wc -l < cookies.txt) lines)"
          else
            echo "⚠️ YOUTUBE_COOKIES not set — yt-dlp may fail authentication."
          fi

      # -------------------------------------------------------
      # MAIN PIPELINE RUN
      # -------------------------------------------------------

      - name: Run Pipeline
        env:
          # Source 1 — Antigravity
          API_KEY:          ${{ secrets.ANTIGRAVITY_API_KEY }}
          API_BASE_URL:     http://127.0.0.1:8045/v1
          # Source 2 — GitHub Models
          GH_MODELS_TOKEN:    ${{ secrets.GH_MODELS_TOKEN }}
          GH_MODELS_BASE_URL: https://models.inference.ai.azure.com
          GH_MODEL:           gpt-4o
          # Source 3 — Cloudflare AI (pool of accounts, auto-rotates on limit)
          CLOUDFLARE_ACCOUNTS_JSON: ${{ secrets.CLOUDFLARE_ACCOUNTS_JSON }}
          CF_AI_MODEL:      "@cf/meta/llama-3.1-8b-instruct"
          # Source 4 — Ollama
          OLLAMA_BASE_URL:  http://127.0.0.1:11434/v1
          OLLAMA_MODEL:     llama3.2:3b
          # Pipeline config
          V_URL:            ${{ secrets.V_URL }}
          TOPIC_LIMIT:      "30"
          # Monthly report: auto on 1st-of-month run; or force via workflow_dispatch
          GENERATE_MONTHLY_REPORT: ${{ github.event.inputs.generate_monthly_report || 'false' }}
          ONLY_GENERATE_REPORT: ${{ github.event.inputs.report_only || 'false' }}
        run: |
          mkdir -p logs
          Xvfb :99 -screen 0 1280x960x24 &
          export DISPLAY=:99
          sleep 3

          google-chrome \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --remote-debugging-port=9222 \
            --disable-session-crashed-bubble \
            --no-first-run \
            --no-default-browser-check \
            --disable-infobars \
            --window-size=1280,960 \
            --window-position=0,0 \
            --user-data-dir="$HOME/.browser-session" \
            "${V_URL:-https://example.com/}" > logs/chrome_startup.log 2>&1 &
          sleep 12

          .venv/bin/python scripts/pipeline.py
          .venv/bin/python scripts/add_google_calendar_event.py

      # -------------------------------------------------------
      # SAVE STATE
      # -------------------------------------------------------

      - name: Save Antigravity Data Session
        if: always()
        uses: actions/cache/save@v4.2.0
        with:
          path: ~/.antigravity_tools
          key: antigravity-data-${{ runner.os }}-${{ github.run_id }}

      - name: Save browser session
        if: always()
        uses: actions/cache/save@v4.2.0
        with:
          path: ~/.browser-session
          key: v-browser-session-${{ runner.os }}-${{ github.run_id }}

      - name: Ensure Ollama model directory exists
        if: always()
        run: mkdir -p ~/.ollama/models

      - name: Save Ollama model cache
        if: always() && steps.cache-ollama-model.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4.2.0
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-3b-v1